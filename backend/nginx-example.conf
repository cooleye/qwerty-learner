# ===== qwerty-learner API 和管理后台 =====
# 这个文件是示例配置，部署时需要放到服务器 nginx 上
# 注意：不要覆盖 english-learning-app 的 nginx 配置

server {
    listen 80;
    server_name api-qwerty.listenup.top;

    # HTTP → HTTPS 重定向
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name api-qwerty.listenup.top;

    client_max_body_size 100M;

    # SSL 证书（与 english-learning-app 共用同一套证书）
    ssl_certificate /etc/nginx/ssl/listenup.top.pem;
    ssl_certificate_key /etc/nginx/ssl/listenup.top.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://qwerty-learner-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
    }
}
